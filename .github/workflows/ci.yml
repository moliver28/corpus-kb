name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  OLLAMA_MODEL: "nomic-embed-text"

jobs:
  lint:
    name: "lint (ruff)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: corpus-kb/pyproject.toml

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check corpus-kb/src/ corpus-kb/tests/

      - name: Ruff format check
        run: ruff format --check corpus-kb/src/ corpus-kb/tests/

  type-check:
    name: "type-check (pyright)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: corpus-kb/pyproject.toml

      - name: Install pyright
        run: pip install pyright

      - name: Pyright strict type check
        run: pyright corpus-kb/src/

  validate-configs:
    name: "validate-configs"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: corpus-kb/pyproject.toml

      - name: Validate config files
        run: python corpus-kb/scripts/validate_configs.py

  test:
    name: "test (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    needs: validate-configs
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: corpus-kb/pyproject.toml

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e corpus-kb/.
          pip install pytest pytest-asyncio

      - name: Cache Ollama models (Ubuntu/macOS)
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-${{ env.OLLAMA_MODEL }}-${{ runner.os }}

      - name: Cache Ollama models (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: ${{ format('{0}\ollama\models', env.APPDATA) }}
          key: ollama-${{ env.OLLAMA_MODEL }}-${{ runner.os }}

      - name: Install Ollama (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve > /tmp/ollama.log 2>&1 &
          sleep 5

      - name: Install Ollama (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve > /tmp/ollama.log 2>&1 &
          sleep 5

      - name: Install Ollama (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Write-Host "Installing Ollama on Windows..."
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://ollama.com/download/OllamaSetup.exe" -OutFile "OllamaSetup.exe" -ErrorAction Stop
          Start-Process -FilePath "OllamaSetup.exe" -ArgumentList "/S" -Wait -ErrorAction Stop
          Write-Host "Ollama installed"
          $OllamaPath = "C:\Users\$env:USERNAME\AppData\Local\Programs\Ollama\ollama.exe"
          if (-not (Test-Path $OllamaPath)) {
            Write-Host "ERROR: Ollama not found at expected path"
            throw "Ollama executable not found"
          }
          Write-Host "Starting Ollama service..."
          Start-Service -Name "Ollama" -ErrorAction SilentlyContinue
          Start-Process -FilePath $OllamaPath -ArgumentList "serve" -WindowStyle Hidden
          Start-Sleep -Seconds 5

      - name: Pull embedding model
        run: |
          ollama pull ${{ env.OLLAMA_MODEL }}

      - name: Verify Ollama (Ubuntu/macOS)
        if: runner.os != 'Windows'
        run: |
          for i in {1..10}; do
            if curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama is ready"
              break
            fi
            echo "Attempt $i/10: Waiting for Ollama..."
            sleep 1
          done

      - name: Verify Ollama (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $maxAttempts = 10
          for ($i = 1; $i -le $maxAttempts; $i++) {
            try {
              $response = Invoke-WebRequest -Uri "http://localhost:11434/api/tags" -ErrorAction Stop
              Write-Host "Ollama is ready"
              exit 0
            } catch {
              if ($i -lt $maxAttempts) {
                Write-Host "Attempt $i/$maxAttempts: Waiting for Ollama..."
                Start-Sleep -Seconds 1
              } else {
                Write-Host "ERROR: Ollama not responding after $maxAttempts attempts"
                exit 1
              }
            }
          }

      - name: Run tests
        run: python -m pytest corpus-kb/tests/test_ingest.py -v --tb=short --durations=10 --rootdir corpus-kb/
